<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">FabGuard 제조 설비 이벤트 수집 및 이상 탐지 아키텍처</title>
  <desc id="desc">반도체 Fab 센서 이벤트가 Edge Gateway, Kafka, Flink, 저장소, Dashboard와 Alert로 흐르는 구조와 Kafka 이전/이후 복구 기준을 나타낸 아키텍처 다이어그램.</desc>

  <defs>
    <style>
      .bg { fill: #f6f7f9; }
      .area { stroke-width: 1.5; stroke-dasharray: 7 5; }
      .factory { fill: #f0f5f9; stroke: #cbd5e1; }
      .ingest { fill: #eff6ff; stroke: #bfdbfe; }
      .stream { fill: #ecfdf5; stroke: #a7f3d0; }
      .storage { fill: #fffbeb; stroke: #fde68a; }
      .output { fill: #f5f3ff; stroke: #ddd6fe; }
      .recovery { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; }

      .node { fill: #ffffff; stroke: #d7dce3; stroke-width: 1.4; filter: url(#shadow); }
      .node-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; filter: url(#shadow); }
      .node-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; filter: url(#shadow); }
      .node-amber { fill: #fffbeb; stroke: #fcd34d; stroke-width: 1.5; filter: url(#shadow); }
      .node-red { fill: #fef3f2; stroke: #fca5a5; stroke-width: 1.5; filter: url(#shadow); }
      .node-violet { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 1.5; filter: url(#shadow); }
      .node-dark { fill: #1f2933; stroke: #1f2933; stroke-width: 1.5; filter: url(#shadow); }
      .small { fill: #ffffff; stroke: #d7dce3; stroke-width: 1.2; }

      .title { font: 800 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .subtitle { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
      .area-title { font: 800 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .area-sub { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
      .box-title { font: 800 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .box-title-sm { font: 800 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .box-body { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
      .box-body-strong { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475467; }
      .box-body-warn { font: 800 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b42318; }
      .box-body-ok { font: 800 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f766e; }
      .badge-text { font: 800 10.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow-label { font: 800 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475467; }
      .arrow-label-amber { font: 800 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b45309; }
      .arrow-label-blue { font: 800 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2563eb; }
      .legend { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475467; }

      .arrow { stroke: #475467; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #98a2b3; stroke-width: 1.8; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrowSoft); }
      .arrow-blue { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
      .arrow-green { stroke: #0f766e; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
      .arrow-amber { stroke: #b45309; stroke-width: 2.5; fill: none; marker-end: url(#arrowAmber); }
      .arrow-red { stroke: #b42318; stroke-width: 2.3; fill: none; marker-end: url(#arrowRed); }
    </style>

    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.4" flood-color="#101828" flood-opacity="0.08" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475467" />
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#98a2b3" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e" />
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b42318" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1050" />
  <text class="title" x="44" y="54">FabGuard 제조 설비 이벤트 수집 및 이상 탐지 아키텍처</text>
  <text class="subtitle" x="44" y="82">초당 50,000 events/sec · 수집 1초 · 이상 탐지 3초 · 알림 5초 목표. 핵심은 Kafka 이전/이후 복구 기준 분리.</text>

  <rect class="area factory" x="24" y="115" width="300" height="675" rx="16" />
  <text class="area-title" x="42" y="143">Factory / Edge</text>
  <text class="area-sub" x="42" y="162">장비 근처 · Kafka 이전 유실 방어</text>

  <rect class="area ingest" x="350" y="115" width="290" height="675" rx="16" />
  <text class="area-title" x="368" y="143">Ingestion</text>
  <text class="area-sub" x="368" y="162">Collector · Kafka · DLQ</text>

  <rect class="area stream" x="666" y="115" width="300" height="675" rx="16" />
  <text class="area-title" x="684" y="143">Stream Processing</text>
  <text class="area-sub" x="684" y="162">Flink event-time window · checkpoint</text>

  <rect class="area storage" x="992" y="115" width="310" height="675" rx="16" />
  <text class="area-title" x="1010" y="143">Storage</text>
  <text class="area-sub" x="1010" y="162">최근 조회 · 장기 archive · 이상 이력</text>

  <rect class="area output" x="1328" y="115" width="248" height="675" rx="16" />
  <text class="area-title" x="1346" y="143">Output</text>
  <text class="area-sub" x="1346" y="162">Dashboard · Alert · MES</text>

  <rect class="node-blue" x="45" y="190" width="250" height="96" rx="10" />
  <rect x="62" y="207" width="70" height="20" rx="10" fill="#dbeafe" />
  <text class="badge-text" x="78" y="221" fill="#2563eb">Sensors</text>
  <text class="box-title" x="62" y="249">Chamber Sensors</text>
  <text class="box-body" x="62" y="268">Temp · Pressure · Gas Flow · RF Power</text>

  <rect class="node" x="45" y="316" width="250" height="86" rx="10" />
  <rect x="62" y="333" width="76" height="20" rx="10" fill="#f2f4f7" />
  <text class="badge-text" x="77" y="347" fill="#475467">Equipment</text>
  <text class="box-title" x="62" y="371">Equipment Logs</text>
  <text class="box-body" x="62" y="390">Alarm · state · recipe phase</text>

  <rect class="node-amber" x="45" y="455" width="250" height="168" rx="10" />
  <rect x="62" y="472" width="78" height="20" rx="10" fill="#fef3c7" />
  <text class="badge-text" x="77" y="486" fill="#b45309">Safety Net</text>
  <text class="box-title" x="62" y="514">Edge Gateway</text>
  <text class="box-body" x="62" y="535">schema validation · enrich</text>
  <text class="box-body" x="62" y="554">local disk buffer</text>
  <text class="box-body" x="62" y="573">sequenceNo · eventId</text>
  <text class="box-body-ok" x="62" y="596">Kafka 이전 복구 기준</text>
  <text class="box-body-warn" x="62" y="615">buffer full: data_degraded emit</text>

  <path class="arrow" d="M 170 286 L 170 316" />
  <path class="arrow" d="M 170 402 L 170 455" />

  <rect class="node-green" x="378" y="210" width="235" height="108" rx="10" />
  <rect x="395" y="227" width="74" height="20" rx="10" fill="#d1fae5" />
  <text class="badge-text" x="409" y="241" fill="#0f766e">Producer</text>
  <text class="box-title" x="395" y="272">Collector Service</text>
  <text class="box-body" x="395" y="292">retry · backoff · acks=all</text>
  <text class="box-body" x="395" y="310">schema registry check</text>

  <rect class="node-blue" x="378" y="380" width="235" height="210" rx="10" />
  <rect x="395" y="397" width="54" height="20" rx="10" fill="#dbeafe" />
  <text class="badge-text" x="409" y="411" fill="#2563eb">Kafka</text>
  <text class="box-title" x="395" y="442">Kafka Cluster</text>
  <text class="box-body" x="395" y="464">sensor-raw-v1</text>
  <text class="box-body" x="395" y="483">equipment-alarm-v1</text>
  <text class="box-body" x="395" y="502">anomaly-events-v1</text>
  <text class="box-body" x="395" y="521">schema-error-dlq-v1</text>
  <text class="box-body-strong" x="395" y="548">key = factoryId + chamberId</text>
  <text class="box-body-ok" x="395" y="570">offset = Kafka 이후 복구 기준</text>

  <path class="arrow-green" d="M 295 539 C 325 539 338 264 378 264" />
  <text class="arrow-label" x="315" y="440">micro-batch</text>
  <text class="arrow-label" x="315" y="456">by chamber</text>
  <path class="arrow-blue" d="M 495 318 L 495 380" />
  <text class="arrow-label-blue" x="507" y="354">publish</text>

  <rect class="node-green" x="695" y="205" width="238" height="118" rx="10" />
  <rect x="712" y="222" width="58" height="20" rx="10" fill="#d1fae5" />
  <text class="badge-text" x="724" y="236" fill="#0f766e">Parse</text>
  <text class="box-title" x="712" y="267">Flink Parse Job</text>
  <text class="box-body" x="712" y="287">schema normalize</text>
  <text class="box-body" x="712" y="306">late event side output</text>

  <rect class="node-green" x="695" y="370" width="238" height="190" rx="10" />
  <rect x="712" y="387" width="86" height="20" rx="10" fill="#d1fae5" />
  <text class="badge-text" x="727" y="401" fill="#0f766e">Detection</text>
  <text class="box-title" x="712" y="431">Flink Anomaly Job</text>
  <text class="box-body" x="712" y="453">event-time window</text>
  <text class="box-body" x="712" y="472">threshold · moving avg</text>
  <text class="box-body" x="712" y="491">rolling stddev · z-score</text>
  <text class="box-body" x="712" y="514">watermark = eventTime - 5s</text>
  <text class="box-body-ok" x="712" y="539">avg detection latency ≤ 3s</text>

  <rect class="node" x="695" y="616" width="238" height="86" rx="10" />
  <rect x="712" y="633" width="82" height="20" rx="10" fill="#f2f4f7" />
  <text class="badge-text" x="726" y="647" fill="#475467">Recovery</text>
  <text class="box-title" x="712" y="672">Checkpoint Store</text>
  <text class="box-body" x="712" y="692">offset + operator state</text>

  <path class="arrow-blue" d="M 613 485 C 650 485 660 264 695 264" />
  <text class="arrow-label-blue" x="635" y="366">consume</text>
  <path class="arrow-green" d="M 814 323 L 814 370" />
  <path class="arrow-green" d="M 814 560 L 814 616" />
  <text class="arrow-label" x="828" y="592">checkpoint</text>

  <rect class="node-amber" x="1020" y="185" width="250" height="118" rx="10" />
  <rect x="1037" y="202" width="58" height="20" rx="10" fill="#fef3c7" />
  <text class="badge-text" x="1049" y="216" fill="#b45309">Recent</text>
  <text class="box-title" x="1037" y="247">Time-series DB</text>
  <text class="box-body" x="1037" y="267">7~30d high-res raw</text>
  <text class="box-body" x="1037" y="286">1y+ downsample aggregate</text>

  <rect class="node-amber" x="1020" y="342" width="250" height="118" rx="10" />
  <rect x="1037" y="359" width="72" height="20" rx="10" fill="#fef3c7" />
  <text class="badge-text" x="1051" y="373" fill="#b45309">Archive</text>
  <text class="box-title" x="1037" y="404">Object Storage</text>
  <text class="box-body" x="1037" y="424">compressed raw archive</text>
  <text class="box-body" x="1037" y="443">replay · metrology analysis</text>

  <rect class="node-red" x="1020" y="500" width="250" height="118" rx="10" />
  <rect x="1037" y="517" width="78" height="20" rx="10" fill="#fee4e2" />
  <text class="badge-text" x="1051" y="531" fill="#b42318">Anomaly</text>
  <text class="box-title" x="1037" y="562">Anomaly Store</text>
  <text class="box-body" x="1037" y="582">status · ack · recovery</text>
  <text class="box-body" x="1037" y="601">anomalyId unique key</text>

  <rect class="node" x="1020" y="658" width="250" height="92" rx="10" />
  <rect x="1037" y="675" width="72" height="20" rx="10" fill="#f2f4f7" />
  <text class="badge-text" x="1051" y="689" fill="#475467">Quality</text>
  <text class="box-title" x="1037" y="719">Metrology Data</text>
  <text class="box-body" x="1037" y="739">waferId · lotId · recipeId</text>

  <path class="arrow-amber" d="M 933 465 C 965 465 980 244 1020 244" />
  <path class="arrow-amber" d="M 933 482 C 970 482 980 401 1020 401" />
  <path class="arrow-red" d="M 933 504 C 970 504 980 559 1020 559" />
  <path class="arrow-soft" d="M 1145 658 L 1145 618" />
  <text class="arrow-label" x="1160" y="645">quality join</text>

  <rect class="node-violet" x="1350" y="220" width="200" height="128" rx="10" />
  <rect x="1367" y="237" width="78" height="20" rx="10" fill="#ede9fe" />
  <text class="badge-text" x="1382" y="251" fill="#5b21b6">Dashboard</text>
  <text class="box-title" x="1367" y="282">Dashboard API</text>
  <text class="box-body" x="1367" y="302">last 1h sensor graph</text>
  <text class="box-body" x="1367" y="321">anomaly timeline</text>
  <text class="box-body-warn" x="1367" y="340">show freshness / lag</text>

  <rect class="node-violet" x="1350" y="430" width="200" height="128" rx="10" />
  <rect x="1367" y="447" width="62" height="20" rx="10" fill="#ede9fe" />
  <text class="badge-text" x="1381" y="461" fill="#5b21b6">Alert</text>
  <text class="box-title" x="1367" y="492">Alert Service</text>
  <text class="box-body" x="1367" y="512">dedup window · escalation</text>
  <text class="box-body" x="1367" y="531">Critical: SMS / MES</text>
  <text class="box-body-ok" x="1367" y="550">alert latency ≤ 5s</text>

  <rect class="node" x="1350" y="610" width="200" height="88" rx="10" />
  <rect x="1367" y="627" width="70" height="20" rx="10" fill="#f2f4f7" />
  <text class="badge-text" x="1382" y="641" fill="#475467">Channel</text>
  <text class="box-title" x="1367" y="670">Slack / SMS / MES</text>
  <text class="box-body" x="1367" y="690">engineer response</text>

  <path class="arrow" d="M 1270 244 L 1350 284" />
  <path class="arrow" d="M 1270 559 L 1350 494" />
  <path class="arrow" d="M 1450 558 L 1450 610" />

  <rect class="recovery" x="44" y="825" width="1512" height="150" rx="14" />
  <text class="area-title" x="64" y="858">Deep Dive: 장애 복구 기준을 Kafka 이전과 이후로 분리</text>
  <text class="area-sub" x="64" y="880">질문에 답하기 가장 좋은 포인트: "장애가 나도 데이터가 어디에 남아 있고, 어디서부터 다시 처리할 수 있는가?"</text>

  <rect class="node-amber" x="72" y="902" width="430" height="52" rx="10" />
  <text class="box-title-sm" x="92" y="923">Kafka 이전</text>
  <text class="box-body" x="92" y="943">Edge local disk buffer + sequenceNo + eventId</text>

  <rect class="node-blue" x="532" y="902" width="430" height="52" rx="10" />
  <text class="box-title-sm" x="552" y="923">Kafka 이후</text>
  <text class="box-body" x="552" y="943">Kafka offset + Flink checkpoint / savepoint</text>

  <rect class="node-green" x="992" y="902" width="430" height="52" rx="10" />
  <text class="box-title-sm" x="1012" y="923">Sink 재처리</text>
  <text class="box-body" x="1012" y="943">eventId / window key / anomalyId 기반 idempotent write</text>

  <path class="arrow-amber" d="M 502 928 L 532 928" />
  <path class="arrow-blue" d="M 962 928 L 992 928" />

  <rect x="72" y="990" width="18" height="10" rx="5" fill="#fef3c7" stroke="#fcd34d" />
  <text class="legend" x="98" y="999">유실 최소화 우선</text>
  <rect x="230" y="990" width="18" height="10" rx="5" fill="#dbeafe" stroke="#93c5fd" />
  <text class="legend" x="256" y="999">재처리 기준점</text>
  <rect x="390" y="990" width="18" height="10" rx="5" fill="#ecfdf5" stroke="#86efac" />
  <text class="legend" x="416" y="999">실시간 탐지 경로</text>
  <rect x="552" y="990" width="18" height="10" rx="5" fill="#fef3f2" stroke="#fca5a5" />
  <text class="legend" x="578" y="999">사람이 봐야 하는 이상 이벤트</text>
</svg>
